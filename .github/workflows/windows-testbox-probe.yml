name: Windows Testbox Probe

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Git ref or SHA to check out"
        required: false
        default: "main"
        type: string
      runner_label:
        description: "Windows runner label"
        required: false
        default: "blacksmith-16vcpu-windows-2025"
        type: choice
        options:
          - blacksmith-16vcpu-windows-2025
          - blacksmith-32vcpu-windows-2025
          - windows-2025
      model:
        description: "OpenAI model id"
        required: false
        default: "openai/gpt-5.4"
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  probe:
    name: Windows agent exec proof
    runs-on: ${{ inputs.runner_label }}
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref || github.ref }}
          persist-credentials: false
          submodules: false

      - name: Try to exclude workspace from Windows Defender
        run: |
          $cmd = Get-Command Add-MpPreference -ErrorAction SilentlyContinue
          if (-not $cmd) {
            Write-Host "Add-MpPreference not available, skipping Defender exclusions."
            exit 0
          }

          try {
            Add-MpPreference -ExclusionPath "$env:GITHUB_WORKSPACE" -ErrorAction Stop
            Add-MpPreference -ExclusionProcess "node.exe" -ErrorAction Stop
            Write-Host "Defender exclusions applied."
          } catch {
            Write-Warning "Failed to apply Defender exclusions, continuing. $($_.Exception.Message)"
          }

      - name: Setup Node environment
        uses: ./.github/actions/setup-node-env
        with:
          node-version: "24.x"
          install-bun: "false"

      - name: Real Windows agent exec proof
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MODEL_ID: ${{ inputs.model }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false

          if (-not $env:OPENAI_API_KEY) {
            throw "Missing OPENAI_API_KEY secret."
          }
          if ($env:RUNNER_OS -ne "Windows") {
            throw "Expected Windows runner, got $env:RUNNER_OS."
          }
          $nodePlatform = (& node -p "process.platform").Trim()
          if ($nodePlatform -ne "win32") {
            throw "Expected node process.platform=win32, got $nodePlatform."
          }
          if ($env:MODEL_ID -notmatch '^openai/.+') {
            throw "This probe expects an OpenAI model id, got $env:MODEL_ID."
          }

          $proofRoot = Join-Path $env:RUNNER_TEMP "openclaw-windows-agent-proof"
          $stateDir = Join-Path $proofRoot "state"
          $workspace = Join-Path $proofRoot "workspace"
          $configPath = Join-Path $stateDir "openclaw.json"
          New-Item -ItemType Directory -Force -Path $stateDir, $workspace | Out-Null

          $env:OPENCLAW_STATE_DIR = $stateDir
          $env:OPENCLAW_CONFIG_PATH = $configPath
          $env:OPENCLAW_WORKSPACE_DIR = $workspace

          $modelName = $env:MODEL_ID.Substring("openai/".Length)
          $config = @{
            agents = @{
              defaults = @{
                skipBootstrap = $true
                workspace = $workspace
                model = @{ primary = $env:MODEL_ID }
                models = @{
                  ($env:MODEL_ID) = @{
                    alias = "GPT"
                    params = @{ transport = "sse" }
                    agentRuntime = @{ id = "pi" }
                  }
                }
              }
            }
            models = @{
              providers = @{
                openai = @{
                  api = "openai-responses"
                  baseUrl = "https://api.openai.com/v1"
                  apiKey = @{
                    source = "env"
                    provider = "default"
                    id = "OPENAI_API_KEY"
                  }
                  timeoutSeconds = 1800
                  models = @(
                    @{
                      id = $modelName
                      name = $modelName
                      contextWindow = 1047576
                      maxTokens = 32768
                    }
                  )
                }
              }
            }
            tools = @{
              profile = "coding"
              exec = @{
                host = "gateway"
                security = "full"
                ask = "off"
                timeoutSec = 120
              }
            }
          }
          $config | ConvertTo-Json -Depth 20 | Set-Content -Path $configPath -Encoding UTF8

          @'
          # Identity

          - Name: OpenClaw
          - Purpose: Windows agent exec proof assistant.
          '@ | Set-Content -Path (Join-Path $workspace "IDENTITY.md") -Encoding UTF8
          New-Item -ItemType Directory -Force -Path (Join-Path $workspace ".openclaw") | Out-Null
          @'
          {
            "version": 1,
            "setupCompletedAt": "2026-01-01T00:00:00.000Z"
          }
          '@ | Set-Content -Path (Join-Path $workspace ".openclaw\workspace-state.json") -Encoding UTF8

          pnpm openclaw --version

          $sessionId = "windows-agent-exec-proof"
          $proofFile = Join-Path $workspace "windows-agent-proof.txt"
          $sessionPath = Join-Path $stateDir "agents\main\sessions\$sessionId.jsonl"
          Remove-Item $proofFile -Force -ErrorAction SilentlyContinue
          Remove-Item $sessionPath -Force -ErrorAction SilentlyContinue

          $message = @"
          Create a file named windows-agent-proof.txt in the current workspace with exact content WINDOWS_AGENT_EXEC_OK and no trailing newline. Use the exec tool exactly once. You are running on Windows, so use the native Windows shell style for the command. Do not use bash, sh, WSL, touch, printf, or /bin paths. After the exec tool succeeds, reply with exact text OK.
          "@

          $agentOutput = pnpm openclaw agent --local --agent main --session-id $sessionId --model $env:MODEL_ID --message $message --thinking off --timeout 600 --json 2>&1
          $agentExit = $LASTEXITCODE
          if ($null -ne $agentOutput) { $agentOutput | ForEach-Object { $_ } }
          if ($agentExit -ne 0) {
            throw "agent failed with exit code $agentExit"
          }
          if (($agentOutput | Out-String) -notmatch '"finalAssistant(Raw|Visible)Text":\s*"OK"') {
            throw "agent finished without exact OK response"
          }
          if (-not (Test-Path $proofFile)) {
            throw "agent did not create proof file"
          }
          $proofContent = [System.IO.File]::ReadAllText($proofFile)
          if ($proofContent -ne "WINDOWS_AGENT_EXEC_OK") {
            throw "proof file content mismatch: [$proofContent]"
          }
          if (-not (Test-Path $sessionPath)) {
            throw "session transcript not found at $sessionPath"
          }

          $execCommands = New-Object System.Collections.Generic.List[string]
          foreach ($line in [System.IO.File]::ReadLines($sessionPath)) {
            if (-not $line.Trim()) { continue }
            $record = $line | ConvertFrom-Json
            $messageRecord = $record.message
            if ($null -eq $messageRecord -or $messageRecord.role -ne "assistant") { continue }
            foreach ($block in @($messageRecord.content)) {
              if ($block.type -eq "toolCall" -and $block.name -eq "exec") {
                $execCommands.Add([string]$block.arguments.command)
              }
            }
          }
          if ($execCommands.Count -ne 1) {
            throw "expected exactly one exec call, got $($execCommands.Count)"
          }

          $command = $execCommands[0]
          $forbidden = @("bash", "sh -c", "/bin/sh", "/bin/bash", "wsl", "touch ", "printf ")
          foreach ($term in $forbidden) {
            if ($command.IndexOf($term, [System.StringComparison]::OrdinalIgnoreCase) -ge 0) {
              throw "exec command used forbidden POSIX term '$term': $command"
            }
          }
          $windowsNative =
            $command -match '(?i)\b(Set-Content|Out-File|New-Item|cmd(?:\.exe)?|powershell(?:\.exe)?|pwsh(?:\.exe)?)\b' -or
            $command -match '\\' -or
            $command -match '\$[A-Za-z_][A-Za-z0-9_]*'
          if (-not $windowsNative) {
            throw "exec command did not look Windows-native: $command"
          }

          $summary = [ordered]@{
            platform = $nodePlatform
            runner = $env:RUNNER_NAME
            model = $env:MODEL_ID
            proofFile = "created"
            proofContent = $proofContent
            execCommand = $command
          }
          $summary | ConvertTo-Json -Depth 5
